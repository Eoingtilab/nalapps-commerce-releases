name: Publish staged product release

on:
  push:
    branches:
      - main
    paths:
      - 'staging/*.zip.b64'
      - 'staging/*.release.env'
      - '.github/workflows/publish-staged-release.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Load release metadata
        run: |
          test -f staging/core.release.env
          set -a
          source staging/core.release.env
          set +a
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "VERSION_TAG=$VERSION_TAG" >> "$GITHUB_ENV"
          echo "CHANNEL_TAG=$CHANNEL_TAG" >> "$GITHUB_ENV"
          echo "ASSET_NAME=$ASSET_NAME" >> "$GITHUB_ENV"
          echo "RELEASE_TITLE=$RELEASE_TITLE" >> "$GITHUB_ENV"

      - name: Decode and validate release asset
        run: |
          base64 --decode staging/core.zip.b64 > "$ASSET_NAME"
          unzip -t "$ASSET_NAME"
          TOP_LEVEL=$(unzip -Z1 "$ASSET_NAME" | head -n 1)
          test "$TOP_LEVEL" = "nalapps-commerce-core/"
          sha256sum "$ASSET_NAME" > SHA256SUMS-nalapps-commerce-core.txt
          cat > version.json <<EOF
          {
            "product_id": "nalapps-commerce-core-free",
            "edd_item_id": 277,
            "version": "$VERSION",
            "source_tag": "$VERSION_TAG",
            "channel_tag": "$CHANNEL_TAG",
            "asset": "$ASSET_NAME"
          }
          EOF

      - name: Publish immutable version release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat > version-release-notes.md <<EOF
          # ${RELEASE_TITLE}

          - Version: ${VERSION}
          - EDD Download item_id: 277
          - Plugin folder: nalapps-commerce-core
          - Main file: nalapps-commerce-core.php
          - Asset: ${ASSET_NAME}
          EOF

          if gh release view "$VERSION_TAG" >/dev/null 2>&1; then
            echo "Version release already exists; immutable release will not be overwritten."
          else
            gh release create "$VERSION_TAG" \
              "$ASSET_NAME" \
              SHA256SUMS-nalapps-commerce-core.txt \
              version.json \
              --title "$RELEASE_TITLE" \
              --notes-file version-release-notes.md \
              --prerelease
          fi

      - name: Publish or refresh fixed EDD channel
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat > channel-release-notes.md <<EOF
          # NalApps Commerce Core Current

          This fixed channel always points to the latest validated Core package.

          - Current version: ${VERSION}
          - Source release: ${VERSION_TAG}
          - EDD Download item_id: 277
          - Asset: ${ASSET_NAME}
          EOF

          if gh release view "$CHANNEL_TAG" >/dev/null 2>&1; then
            gh release upload "$CHANNEL_TAG" \
              "$ASSET_NAME" \
              SHA256SUMS-nalapps-commerce-core.txt \
              version.json \
              --clobber
            gh release edit "$CHANNEL_TAG" \
              --title "NalApps Commerce Core Current (${VERSION})" \
              --notes-file channel-release-notes.md \
              --prerelease
          else
            gh release create "$CHANNEL_TAG" \
              "$ASSET_NAME" \
              SHA256SUMS-nalapps-commerce-core.txt \
              version.json \
              --title "NalApps Commerce Core Current (${VERSION})" \
              --notes-file channel-release-notes.md \
              --prerelease
          fi
