name: Publish staged product release

on:
  pull_request:
    paths:
      - 'staging/*.zip.b64'
      - 'staging/*.release.env'
      - '.github/workflows/publish-staged-release.yml'
  push:
    branches:
      - main
    paths:
      - 'staging/*.zip.b64'
      - 'staging/*.release.env'
      - '.github/workflows/publish-staged-release.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Load release metadata
        run: |
          test -f staging/core.release.env
          set -a
          source staging/core.release.env
          set +a
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "VERSION_TAG=$VERSION_TAG" >> "$GITHUB_ENV"
          echo "CHANNEL_TAG=$CHANNEL_TAG" >> "$GITHUB_ENV"
          echo "ASSET_NAME=$ASSET_NAME" >> "$GITHUB_ENV"
          echo "RELEASE_TITLE=$RELEASE_TITLE" >> "$GITHUB_ENV"
          echo "EXPECTED_SHA256=$EXPECTED_SHA256" >> "$GITHUB_ENV"

      - name: Decode and validate release asset
        run: |
          shopt -s nullglob
          PARTS=(staging/core.part*.zip.b64)
          test "${#PARTS[@]}" -gt 0
          cat "${PARTS[@]}" | base64 --decode > "$ASSET_NAME"
          echo "$EXPECTED_SHA256  $ASSET_NAME" | sha256sum --check --strict
          unzip -t "$ASSET_NAME"
          test "$(unzip -Z1 "$ASSET_NAME" | cut -d/ -f1 | sort -u)" = "nalapps-commerce-core"
          unzip -p "$ASSET_NAME" nalapps-commerce-core/nalapps-commerce-core.php | grep -F "Version: $VERSION"
          sha256sum "$ASSET_NAME" > SHA256SUMS-nalapps-commerce-core.txt
          cat > version.json <<EOF
          {
            "product_id": "nalapps-commerce-core-free",
            "edd_item_id": 277,
            "version": "$VERSION",
            "source_tag": "$VERSION_TAG",
            "channel_tag": "$CHANNEL_TAG",
            "asset": "$ASSET_NAME",
            "sha256": "$EXPECTED_SHA256"
          }
          EOF
          python -m json.tool version.json >/dev/null

      - name: Upload validated release payload
        uses: actions/upload-artifact@v4
        with:
          name: staged-core-release
          path: |
            ${{ env.ASSET_NAME }}
            SHA256SUMS-nalapps-commerce-core.txt
            version.json
          if-no-files-found: error

  publish:
    needs: validate
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Load release metadata
        run: |
          set -a
          source staging/core.release.env
          set +a
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "VERSION_TAG=$VERSION_TAG" >> "$GITHUB_ENV"
          echo "CHANNEL_TAG=$CHANNEL_TAG" >> "$GITHUB_ENV"
          echo "ASSET_NAME=$ASSET_NAME" >> "$GITHUB_ENV"
          echo "RELEASE_TITLE=$RELEASE_TITLE" >> "$GITHUB_ENV"
          echo "EXPECTED_SHA256=$EXPECTED_SHA256" >> "$GITHUB_ENV"

      - uses: actions/download-artifact@v4
        with:
          name: staged-core-release
          path: release-payload

      - name: Revalidate payload
        run: |
          cd release-payload
          echo "$EXPECTED_SHA256  $ASSET_NAME" | sha256sum --check --strict
          unzip -t "$ASSET_NAME"

      - name: Publish immutable version release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd release-payload
          cat > version-release-notes.md <<EOF
          # ${RELEASE_TITLE}

          - Version: ${VERSION}
          - EDD Download item_id: 277
          - Plugin folder: nalapps-commerce-core
          - Main file: nalapps-commerce-core.php
          - Asset: ${ASSET_NAME}
          - SHA-256: ${EXPECTED_SHA256}
          EOF

          if gh release view "$VERSION_TAG" >/dev/null 2>&1; then
            echo "Version release already exists; immutable release will not be overwritten."
            rm -rf existing-release
            mkdir existing-release
            gh release download "$VERSION_TAG" --pattern SHA256SUMS-nalapps-commerce-core.txt --dir existing-release
            EXISTING_SHA=$(awk '{print $1}' existing-release/SHA256SUMS-nalapps-commerce-core.txt)
            test "$EXISTING_SHA" = "$EXPECTED_SHA256"
          else
            gh release create "$VERSION_TAG" \
              "$ASSET_NAME" \
              SHA256SUMS-nalapps-commerce-core.txt \
              version.json \
              --title "$RELEASE_TITLE" \
              --notes-file version-release-notes.md \
              --prerelease
          fi

      - name: Publish or refresh fixed EDD channel
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd release-payload
          cat > channel-release-notes.md <<EOF
          # NalApps Commerce Core Current

          This fixed channel always points to the latest validated Core package.

          - Current version: ${VERSION}
          - Source release: ${VERSION_TAG}
          - EDD Download item_id: 277
          - Asset: ${ASSET_NAME}
          - SHA-256: ${EXPECTED_SHA256}
          EOF

          if gh release view "$CHANNEL_TAG" >/dev/null 2>&1; then
            gh release upload "$CHANNEL_TAG" \
              "$ASSET_NAME" \
              SHA256SUMS-nalapps-commerce-core.txt \
              version.json \
              --clobber
            gh release edit "$CHANNEL_TAG" \
              --title "NalApps Commerce Core Current (${VERSION})" \
              --notes-file channel-release-notes.md \
              --prerelease
          else
            gh release create "$CHANNEL_TAG" \
              "$ASSET_NAME" \
              SHA256SUMS-nalapps-commerce-core.txt \
              version.json \
              --title "NalApps Commerce Core Current (${VERSION})" \
              --notes-file channel-release-notes.md \
              --prerelease
          fi

      - name: Record successful publication
        run: |
          mkdir -p releases
          cat > releases/published-commerce-core-current.json <<EOF
          {
            "product_id": "nalapps-commerce-core-free",
            "edd_item_id": 277,
            "version": "$VERSION",
            "version_tag": "$VERSION_TAG",
            "channel_tag": "$CHANNEL_TAG",
            "asset": "$ASSET_NAME",
            "sha256": "$EXPECTED_SHA256",
            "workflow_run_id": "${GITHUB_RUN_ID}",
            "published_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
          python -m json.tool releases/published-commerce-core-current.json >/dev/null
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add releases/published-commerce-core-current.json
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Record published Core ${VERSION} release"
          git push origin HEAD:main
